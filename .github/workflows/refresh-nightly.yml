name: Nightly Refresh

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger refresh over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Nightly refresh trigger at $(date -Is)"
            HTTP_CODE=$(curl -sS -o /tmp/yhunter-refresh.json -w "%{http_code}" -X POST http://127.0.0.1:3000/api/dashboard)
            echo "HTTP status: ${HTTP_CODE}"
            head -c 500 /tmp/yhunter-refresh.json || true
            echo
            if [ "${HTTP_CODE}" != "200" ]; then
              exit 1
            fi
